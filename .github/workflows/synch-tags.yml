name: Synch Tags

on:
  push:
    tags:
      - 'v*'

jobs:
  sync-tags:
    # Only the upstream repo's GITHUB_TOKEN has write access to the
    # CGJennings/se3docs docs repo. On forks the cross-repo tag creation
    # always fails, so skip the job entirely.
    if: github.repository == 'CGJennings/strange-eons'
    runs-on: ubuntu-latest
    steps:
      - name: Create same tag on doc repository
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tagName = context.ref.replace('refs/tags/', '');
            const repo = 'CGJennings/se3docs';
            const owner = 'CGJennings';
            const sha = context.sha;
            await github.rest.git.createRef({
              owner,
              repo,
              ref: `refs/tags/${tagName}`,
              sha
            });