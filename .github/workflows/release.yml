name: Release

# Triggered by pushing a tag matching v<major>.<minor>.<patch>[-<type>]
# (e.g., v3.5.0, v3.5.0-alpha, v3.5.0-beta1).
#
# This workflow only builds installers and publishes them as GitHub Release
# assets. The strange-eons-registry repo's hourly build-catalog workflow
# (https://github.com/christophercurrie/strange-eons-registry) picks up the
# release and rehosts it on strangeeons.org.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  parse-version:
    runs-on: ubuntu-latest
    outputs:
      major: ${{ steps.parse.outputs.major }}
      minor: ${{ steps.parse.outputs.minor }}
      patch: ${{ steps.parse.outputs.patch }}
      build: ${{ steps.parse.outputs.build }}
      type: ${{ steps.parse.outputs.type }}
      version: ${{ steps.parse.outputs.version }}
      suffix: ${{ steps.parse.outputs.suffix }}
      tag: ${{ steps.parse.outputs.tag }}
    steps:
      - name: Checkout (with full history for rev-list)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Parse version
        id: parse
        shell: bash
        run: |
          set -euo pipefail
          RAW="${GITHUB_REF#refs/tags/v}"
          if [[ ! "$RAW" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)(-(.+))?$ ]]; then
            echo "::error::Version '$RAW' does not match v<major>.<minor>.<patch>[-<type>]"
            exit 1
          fi
          MAJOR="${BASH_REMATCH[1]}"
          MINOR="${BASH_REMATCH[2]}"
          PATCH="${BASH_REMATCH[3]}"
          SUFFIX="${BASH_REMATCH[5]}"
          TYPE="$SUFFIX"
          # Bare version (no -suffix) is the only thing routed to the stable
          # channel; any pre-release suffix (alpha/beta/test/rc/etc.) maps to
          # an experimental release type.
          case "${TYPE,,}" in
            "")     TYPE=GENERAL ;;
            alpha*) TYPE=ALPHA ;;
            beta*)  TYPE=BETA ;;
            *)      TYPE=DEVELOPMENT ;;
          esac
          # Build number anchored above upstream's last release (v3.4.4421-alpha).
          # Counts commits past that anchor so numbers are monotonic on this branch.
          ANCHOR_TAG=v3.4.4421-alpha
          if git rev-parse --verify -q "$ANCHOR_TAG" >/dev/null; then
            COMMITS_PAST=$(git rev-list --count "$ANCHOR_TAG..HEAD")
          else
            COMMITS_PAST=$(git rev-list --count HEAD)
          fi
          BUILD=$((4421 + COMMITS_PAST))
          TAG="v$MAJOR.$MINOR.$PATCH${SUFFIX:+-$SUFFIX}"
          echo "major=$MAJOR" >> "$GITHUB_OUTPUT"
          echo "minor=$MINOR" >> "$GITHUB_OUTPUT"
          echo "patch=$PATCH" >> "$GITHUB_OUTPUT"
          echo "build=$BUILD" >> "$GITHUB_OUTPUT"
          echo "type=$TYPE"   >> "$GITHUB_OUTPUT"
          echo "version=$MAJOR.$MINOR.$PATCH" >> "$GITHUB_OUTPUT"
          echo "suffix=$SUFFIX" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"     >> "$GITHUB_OUTPUT"
          echo "Resolved version: $MAJOR.$MINOR.$PATCH${SUFFIX:+-$SUFFIX} ($TYPE), build $BUILD"

  build:
    needs: parse-version
    strategy:
      fail-fast: false
      matrix:
        include:
          # mvn_prefix wraps the build invocation; only Linux needs Xvfb to
          # provide a display for static initializers that touch AWT (see
          # issue #4). Empty on macOS/Windows where AWT is available natively.
          - os: ubuntu-latest
            profile: jpackage-linux
            artifact: strange-eons-linux
            extra_setup: sudo apt-get update && sudo apt-get install -y rpm fakeroot xvfb
            mvn_prefix: xvfb-run -a
          - os: macos-15-intel
            profile: jpackage-mac
            artifact: strange-eons-macos-x64
            extra_setup: ''
            mvn_prefix: ''
          - os: macos-15
            profile: jpackage-mac
            artifact: strange-eons-macos-aarch64
            extra_setup: ''
            mvn_prefix: ''
          - os: windows-latest
            profile: jpackage-win
            artifact: strange-eons-windows
            extra_setup: ''
            mvn_prefix: ''
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven
      - name: Extra setup for runner
        if: matrix.extra_setup != ''
        shell: bash
        run: ${{ matrix.extra_setup }}
      - name: Build native installers
        shell: bash
        run: |
          ${{ matrix.mvn_prefix }} mvn -B \
            -Dapp.major=${{ needs.parse-version.outputs.major }} \
            -Dapp.minor=${{ needs.parse-version.outputs.minor }} \
            -Dapp.patch=${{ needs.parse-version.outputs.patch }} \
            -Dapp.build=${{ needs.parse-version.outputs.build }} \
            -Dapp.type=${{ needs.parse-version.outputs.type }} \
            -Pdeploy,${{ matrix.profile }} package
      - name: Tar Linux app-image into a portable tarball
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          cd deployment/installers
          if [[ -d "Strange Eons" ]]; then
            tar czf "strange-eons-linux.tar.gz" "Strange Eons"
            rm -rf "Strange Eons"
          fi
      - name: Upload installers
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: deployment/installers/*
          if-no-files-found: error
          retention-days: 7

  release:
    needs: [parse-version, build]
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Download all installer artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
      - name: Rename to canonical asset names
        # The registry's asset_globs match these exact suffixes. Stable
        # releases get a bare version; pre-releases carry the tag suffix
        # (e.g. -alpha2) so multiple in-flight pre-releases coexist.
        shell: bash
        env:
          VER: ${{ needs.parse-version.outputs.version }}
          SUFFIX: ${{ needs.parse-version.outputs.suffix }}
        run: |
          set -euo pipefail
          DS=""
          [[ -n "$SUFFIX" ]] && DS="-$SUFFIX"
          mkdir -p release-assets
          rename_one() {
            local src_dir="$1" pattern="$2" dest_name="$3"
            local found
            found="$(find "artifacts/$src_dir" -type f -name "$pattern" -print -quit 2>/dev/null || true)"
            if [[ -z "$found" ]]; then
              echo "::warning::no $pattern under artifacts/$src_dir"
              return
            fi
            mv "$found" "release-assets/$dest_name"
            echo "  $dest_name <- $found"
          }
          rename_one strange-eons-macos-aarch64 "*.dmg"           "strange-eons-${VER}${DS}-macos-aarch64.dmg"
          rename_one strange-eons-macos-x64     "*.dmg"           "strange-eons-${VER}${DS}-macos-x64.dmg"
          rename_one strange-eons-windows       "*.msi"           "strange-eons-${VER}${DS}-windows.msi"
          rename_one strange-eons-linux         "*.deb"           "strange-eons-${VER}${DS}.deb"
          rename_one strange-eons-linux         "*.rpm"           "strange-eons-${VER}${DS}.rpm"
          rename_one strange-eons-linux         "strange-eons-linux.tar.gz" "strange-eons-${VER}${DS}-linux.tar.gz"
          echo
          echo "Release assets:"
          ls -la release-assets
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.parse-version.outputs.tag }}
          SUFFIX: ${{ needs.parse-version.outputs.suffix }}
          VER: ${{ needs.parse-version.outputs.version }}
          BUILD: ${{ needs.parse-version.outputs.build }}
          TYPE: ${{ needs.parse-version.outputs.type }}
        shell: bash
        run: |
          set -euo pipefail
          PRERELEASE_FLAG=""
          [[ -n "$SUFFIX" ]] && PRERELEASE_FLAG="--prerelease"
          TITLE="Strange Eons ${VER}${SUFFIX:+-$SUFFIX} (build ${BUILD})"
          # `--target` only takes effect when the tag doesn't already exist;
          # for tag-push triggers the tag is already at the commit we want.
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG already exists; uploading assets only."
            gh release upload "$TAG" --repo "$GITHUB_REPOSITORY" --clobber release-assets/*
          else
            gh release create "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --target "${GITHUB_SHA}" \
              --title "$TITLE" \
              --generate-notes \
              $PRERELEASE_FLAG \
              release-assets/*
          fi
          echo
          echo "Release URL:"
          gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json url --jq .url
