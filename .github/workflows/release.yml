name: Release

# Triggered by pushing a tag matching v<major>.<minor>.<patch>[-<type>]
# (e.g., v3.5.0, v3.5.0-alpha, v3.5.0-beta1).
#
# This workflow only builds installers and publishes them as GitHub Release
# assets. The strange-eons-registry repo's hourly build-catalog workflow
# (https://github.com/christophercurrie/strange-eons-registry) picks up the
# release and rehosts it on strangeeons.org.

on:
  push:
    tags:
      - "v*"
  pull_request:
    branches: ["main"]

permissions:
  contents: write

jobs:
  parse-version:
    runs-on: ubuntu-latest
    outputs:
      major: ${{ steps.parse.outputs.major }}
      minor: ${{ steps.parse.outputs.minor }}
      patch: ${{ steps.parse.outputs.patch }}
      build: ${{ steps.parse.outputs.build }}
      type: ${{ steps.parse.outputs.type }}
      version: ${{ steps.parse.outputs.version }}
      suffix: ${{ steps.parse.outputs.suffix }}
      tag: ${{ steps.parse.outputs.tag }}
    steps:
      - name: Checkout (with full history for rev-list)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Parse version
        id: parse
        shell: bash
        run: |
          set -euo pipefail
          # Non-tag runs (pull_request, workflow_dispatch, …) bypass the
          # tag-format check and emit placeholder outputs so the build matrix
          # can run end-to-end against the signing/notarization chain. The
          # release job is tag-only anyway; nothing publishes from a PR run.
          if [[ "${GITHUB_REF}" != refs/tags/v* ]]; then
            # Use 99.99.99 so jpackage accepts the version (its first
            # component must be >= 1) and so the dummy is unmistakable
            # against any real release version.
            echo "Non-tag ref ${GITHUB_REF}; using placeholder version metadata."
            {
              echo "major=99"
              echo "minor=99"
              echo "patch=99"
              echo "build=99999"
              echo "type=DEVELOPMENT"
              echo "version=99.99.99"
              echo "suffix="
              echo "tag=PR"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi
          RAW="${GITHUB_REF#refs/tags/v}"
          if [[ ! "$RAW" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)(-(.+))?$ ]]; then
            echo "::error::Version '$RAW' does not match v<major>.<minor>.<patch>[-<type>]"
            exit 1
          fi
          MAJOR="${BASH_REMATCH[1]}"
          MINOR="${BASH_REMATCH[2]}"
          PATCH="${BASH_REMATCH[3]}"
          SUFFIX="${BASH_REMATCH[5]}"
          TYPE="$SUFFIX"
          # Bare version (no -suffix) is the only thing routed to the stable
          # channel; any pre-release suffix (alpha/beta/test/rc/etc.) maps to
          # an experimental release type.
          case "${TYPE,,}" in
            "")     TYPE=GENERAL ;;
            alpha*) TYPE=ALPHA ;;
            beta*)  TYPE=BETA ;;
            *)      TYPE=DEVELOPMENT ;;
          esac
          # Build number anchored above upstream's last release (v3.4.4421-alpha).
          # Counts commits past that anchor so numbers are monotonic on this branch.
          ANCHOR_TAG=v3.4.4421-alpha
          if git rev-parse --verify -q "$ANCHOR_TAG" >/dev/null; then
            COMMITS_PAST=$(git rev-list --count "$ANCHOR_TAG..HEAD")
          else
            COMMITS_PAST=$(git rev-list --count HEAD)
          fi
          BUILD=$((4421 + COMMITS_PAST))
          TAG="v$MAJOR.$MINOR.$PATCH${SUFFIX:+-$SUFFIX}"
          echo "major=$MAJOR" >> "$GITHUB_OUTPUT"
          echo "minor=$MINOR" >> "$GITHUB_OUTPUT"
          echo "patch=$PATCH" >> "$GITHUB_OUTPUT"
          echo "build=$BUILD" >> "$GITHUB_OUTPUT"
          echo "type=$TYPE"   >> "$GITHUB_OUTPUT"
          echo "version=$MAJOR.$MINOR.$PATCH" >> "$GITHUB_OUTPUT"
          echo "suffix=$SUFFIX" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"     >> "$GITHUB_OUTPUT"
          echo "Resolved version: $MAJOR.$MINOR.$PATCH${SUFFIX:+-$SUFFIX} ($TYPE), build $BUILD"

  build:
    needs: parse-version
    strategy:
      fail-fast: false
      matrix:
        include:
          # mvn_prefix wraps the build invocation; only Linux needs Xvfb to
          # provide a display for static initializers that touch AWT (see
          # issue #4). Empty on macOS/Windows where AWT is available natively.
          - os: ubuntu-latest
            profile: jpackage-linux
            artifact: strange-eons-linux
            extra_setup: sudo apt-get update && sudo apt-get install -y rpm fakeroot xvfb
            mvn_prefix: xvfb-run -a
          # - os: macos-15-intel
          #   profile: jpackage-mac
          #   artifact: strange-eons-macos-x64
          #   extra_setup: ''
          #   mvn_prefix: ''
          - os: macos-15
            profile: jpackage-mac
            artifact: strange-eons-macos-aarch64
            extra_setup: ""
            mvn_prefix: ""
          # - os: windows-latest
          #   profile: jpackage-win
          #   artifact: strange-eons-windows
          #   extra_setup: ''
          #   mvn_prefix: ''
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: "temurin"
          cache: maven
      - name: Extra setup for runner
        if: matrix.extra_setup != ''
        shell: bash
        run: ${{ matrix.extra_setup }}
      # macOS-only: import the Developer ID cert into a temporary keychain so
      # jpackage can sign the .app embedded in the .dmg. The keychain is
      # discarded with the runner VM at job end.
      - name: Import Apple Developer Certificate
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          # 6h timeout: defeats the default 5min auto-lock that would break
          # long Maven builds halfway through signing the bundled JRE.
          security set-keychain-settings -lut 21600 build.keychain
          security import certificate.p12 -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productbuild
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain
          # Fail loudly if the imported cert isn't a Developer ID Application
          # one (e.g. wrong .p12 uploaded) — otherwise the build would silently
          # produce an unsigned bundle that fails notarization much later.
          security find-identity -v -p codesigning build.keychain \
            | tee /tmp/codesign-identities.txt
          if ! grep -q "Developer ID Application" /tmp/codesign-identities.txt; then
            echo "::error::no Developer ID Application identity in build.keychain"
            exit 1
          fi
          rm certificate.p12 /tmp/codesign-identities.txt
      - name: Build native installers
        shell: bash
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail
          EXTRA=()
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            # jpackage's --mac-signing-key-user-name wants only the user/team
            # name fragment (Oracle docs: "Team or user name portion in Apple
            # signing identities"); it prepends "Developer ID Application: "
            # before searching the keychain. Strip that prefix and the trailing
            # " (TEAMID)" suffix (Team IDs are exactly 10 alphanumerics) so the
            # APPLE_SIGNING_IDENTITY secret can stay in its full canonical form
            # ("Developer ID Application: Name (TEAMID)"). Maven property is
            # namespaced; see pom.xml profile id "jpackage-mac-sign".
            JPACKAGE_SIGN_NAME=$(echo "$APPLE_SIGNING_IDENTITY" \
              | sed -E 's/^Developer ID Application: //; s/ \([A-Z0-9]{10}\)$//')
            EXTRA+=("-Dstrange-eons.apple.signing.identity=$JPACKAGE_SIGN_NAME")
          fi
          # ${EXTRA[@]+...} guards against bash 3.2 (default on macOS runners)
          # treating an empty array under `set -u` as an unbound variable.
          ${{ matrix.mvn_prefix }} mvn -B \
            -Dapp.major=${{ needs.parse-version.outputs.major }} \
            -Dapp.minor=${{ needs.parse-version.outputs.minor }} \
            -Dapp.patch=${{ needs.parse-version.outputs.patch }} \
            -Dapp.build=${{ needs.parse-version.outputs.build }} \
            -Dapp.type=${{ needs.parse-version.outputs.type }} \
            ${EXTRA[@]+"${EXTRA[@]}"} \
            -Pdeploy,${{ matrix.profile }} package
      # macOS-only: notarize each produced .dmg synchronously, then staple
      # the ticket so Gatekeeper can validate offline. notarytool returns
      # exit 0 even on rejection in some xcrun builds, hence the explicit
      # "status: Accepted" grep + notarytool log on failure.
      - name: Notarize and staple .dmg
        if: runner.os == 'macOS'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          dmgs=(deployment/installers/*.dmg)
          if (( ${#dmgs[@]} == 0 )); then
            echo "::error::no .dmg produced under deployment/installers/"
            exit 1
          fi
          for dmg in "${dmgs[@]}"; do
            echo "::group::Notarize $dmg"
            xcrun notarytool submit "$dmg" \
              --apple-id "$APPLE_ID" --password "$APPLE_PASSWORD" --team-id "$APPLE_TEAM_ID" \
              --wait --timeout 1800 2>&1 | tee notarize_output.txt
            if ! grep -q "status: Accepted" notarize_output.txt; then
              SUBMISSION_ID=$(grep -oE '[0-9a-f-]{36}' notarize_output.txt | head -1)
              if [[ -n "$SUBMISSION_ID" ]]; then
                xcrun notarytool log "$SUBMISSION_ID" \
                  --apple-id "$APPLE_ID" --password "$APPLE_PASSWORD" --team-id "$APPLE_TEAM_ID"
              fi
              exit 1
            fi
            xcrun stapler staple "$dmg"
            xcrun stapler validate "$dmg"
            echo "::endgroup::"
          done
      - name: Tar Linux app-image into a portable tarball
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          cd deployment/installers
          if [[ -d "Strange Eons" ]]; then
            tar czf "strange-eons-linux.tar.gz" "Strange Eons"
            rm -rf "Strange Eons"
          fi
      - name: Upload installers
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: deployment/installers/*
          if-no-files-found: error
          retention-days: 7

