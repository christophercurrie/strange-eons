name: CI

on:
  push:
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: Set up JDK 25
      uses: actions/setup-java@v5
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven
    - name: Install Xvfb (virtual display for AWT)
      # Several Strange Eons classes touch AWT in their static initializers
      # (PlatformSupport, AbstractStrangeEonsEditor, etc.). Mockito's class
      # instrumentation triggers those <clinit>s, which throw HeadlessException
      # on a headless runner. Wrap the test JVM in xvfb-run so AWT has a
      # display. Tracked by issue #4 for a longer-term audit.
      run: sudo apt-get update && sudo apt-get install -y xvfb
    - name: Build with Maven
      run: xvfb-run -a mvn -B verify --file pom.xml